<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="../js/main.js"></script>
    <title>Document</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="#"
          ><h1>✂️ Book<span>MyHair</span></h1></a
        >
        <div>
          <img src="/images/logo.svg" alt="logo" />
        </div>
      </nav>
    </header>
    <main class="auth-main">
      <div class="auth-container">
        <!-- Branding / Logo -->
        <div class="auth-brand">
          <img src="/images/logo.svg" alt="BookMyHair Logo" />
        </div>

        <!-- Login Form -->
        <div class="auth-form">
          <h2>Login to Your Account</h2>
          <form id="formlog" action="/login/" method="get">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="yourinitial@domain.com"
              required
            />

            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
            <button id="btn" type="submit">Login</button>
          </form>
          <p class="auth-footer">
            Don't have an account? <a href="./register.html">Sign Up</a>
          </p>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 BookMyHair.com | Wdd330 Final Project</p>
    </footer>
  </body>
</html>
